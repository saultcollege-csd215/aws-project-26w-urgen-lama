name: Tests

on:
  push:
    branches: [ "aws-project" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: aws-project

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f app/requirements_flask.txt ]; then pip install -r app/requirements_flask.txt; fi

      - name: Run Tests
        run: pytest

      - name: Dispatch Lambda Deployment
        if: success()
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Deploy Lambda 
          token: ${{ secrets.GITHUB_TOKEN }}
